spring.application.name=hr_manager_project
server.port=8080

# ============================================
# MongoDB Configuration
# ============================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=hrms_db

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

# ============================================
# Thymeleaf
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# ============================================
# File Upload
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Resume Storage
# ============================================
app.resume.upload-dir=./uploads

# ============================================
# Resume Batch Persistence
# ============================================
hr.resume.batch.size=10
hr.resume.batch.interval-ms=5000

# ============================================
# Agent Hot-Plug Configuration
# ============================================
hr.agent.resume-parse.enabled=true
hr.agent.candidate-qualify.enabled=true
hr.agent.ai.mock=true

# ============================================
# Actuator Health
# ============================================
management.endpoint.health.show-details=always
