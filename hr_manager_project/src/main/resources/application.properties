spring.application.name=hr_manager_project
server.port=8080

# ============================================
# Active Profiles
# ============================================
# 本地开发配置放在 application-local.properties 中覆盖
# 启动方式: mvn spring-boot:run -Dspring-boot.run.profiles=local
spring.profiles.active=

# ============================================
# MongoDB Configuration
# ============================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=hrms_db

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

# ============================================
# Thymeleaf
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# ============================================
# File Upload
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Resume Storage
# ============================================
app.resume.upload-dir=./uploads

# ============================================
# Resume Batch Persistence
# ============================================
hr.resume.batch.size=10
hr.resume.batch.interval-ms=5000

# ============================================
# Agent Hot-Plug Configuration
# ============================================
hr.agent.resume-parse.enabled=true
hr.agent.candidate-qualify.enabled=true

# ============================================
# ResumeParseAgent AI Config（简历解析）
# ============================================
hr.agent.resume-parse.ai.mock=true
# hr.agent.resume-parse.ai.api-key=
# hr.agent.resume-parse.ai.api-url=https://api.openai.com/v1/chat/completions
# hr.agent.resume-parse.ai.model=gpt-4o-mini

# ============================================
# OCR Configuration（扫描件PDF支持）
# ============================================
# 启用 OCR 功能，当 PDFBox 提取为空时降级使用 Vision API
# 默认复用简历解析的 API 配置，需使用支持 vision 的模型（如 gpt-4o-mini）
hr.ocr.enabled=true
# hr.ocr.api-key=
# hr.ocr.api-url=${hr.agent.resume-parse.ai.api-url}
hr.ocr.model=gpt-4o-mini
hr.ocr.page-limit=5

# ============================================
# CandidateQualifyAgent AI Config（资质评估）
# ============================================
hr.agent.candidate-qualify.ai.mock=true
# hr.agent.candidate-qualify.ai.api-key=
# hr.agent.candidate-qualify.ai.api-url=https://api.openai.com/v1/chat/completions
# hr.agent.candidate-qualify.ai.model=gpt-4o-mini

# ============================================
# RabbitMQ
# ============================================
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3

# ============================================
# Actuator Health
# ============================================
management.endpoint.health.show-details=always
