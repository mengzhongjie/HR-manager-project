<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/hr-layout :: head('待发Offer处理')}">
</head>
<body>
    <nav th:replace="~{fragments/hr-layout :: navbar}"></nav>
    <div class="container mt-4">
        <h3>待发Offer处理队列</h3>
        <p class="text-muted">以下候选人已通过全部面试，需要HR处理发放Offer。</p>
        <div class="card shadow">
            <div class="card-body">
                <div th:if="${#lists.size(candidates) == 0}" class="alert alert-success">暂无待处理候选人，所有已通过面试的候选人已处理完毕。</div>
                <table th:if="${#lists.size(candidates) > 0}" class="table table-striped">
                    <thead class="table-secondary">
                        <tr><th>姓名</th><th>岗位</th><th>工作年限</th><th>学历</th><th>技术栈</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${candidates}">
                            <td th:text="${c.name}"></td>
                            <td th:text="${c.position}"></td>
                            <td th:text="${c.yearsOfExperience}"></td>
                            <td th:text="${c.educationLevel?.name()}"></td>
                            <td>
                                <span th:each="s : ${c.techStack}" class="badge bg-light text-dark me-1" th:text="${s}"></span>
                            </td>
                            <td>
                                <a th:href="@{'/hr/offers/create?candidateId=' + ${c.id}}" class="btn btn-success btn-sm">发Offer</a>
                                <a th:href="@{'/hr/positions/' + ${c.position} + '/candidates/' + ${c.id}}" class="btn btn-outline-primary btn-sm">查看</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
